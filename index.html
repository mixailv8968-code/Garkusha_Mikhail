<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт — картинка по центру</title>
    <style>
        /* Убираем все отступы на body и html, чтобы ничего не мешало */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; /* Обеспечиваем полную высоту */
        }

        /* Само body — это гибкий контейнер, который центрирует своё содержимое */
        body {
            display: flex;
            align-items: center;     /* Вертикальное центрирование */
            justify-content: center; /* Горизонтальное центрирование */
            background-color: #ffffff; /* Цвет фона на случай, если картинка не загрузится или останутся поля */
        }

        /* Контейнер для картинки — занимает всю ширину, но оставляет возможность центрировать само изображение */
        .image-wrapper {
            width: 100%; /* Растягиваем на всю ширину окна */
            text-align: center; /* Горизонтальное выравнивание содержимого (для надёжности) */
        }

        /* Сама картинка */
        .image-wrapper img {
            display: block;     /* Убирает лишнее пространство снизу */
            width: 100%;        /* Ширина = 100% родительского контейнера (то есть всего экрана) */
            height: auto;       /* Высота подбирается автоматически, сохраняя пропорции */
            max-width: 100%;    /* Страховка, чтобы не вылезти за границы */
            margin: 0 auto;     /* Дополнительное центрирование, если вдруг */
        }
    </style>
</head>
<body>
    <div class="image-wrapper">
        <!-- 
            ⚠️ ВАЖНО: замени путь на свою картинку!
            Пример: если у тебя в папке "images" лежит файл "foto.jpg", 
            напиши src="images/foto.jpg"
