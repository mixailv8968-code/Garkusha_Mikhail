<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт — картинка по центру</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }

        .image-wrapper {
            width: 100%;
            text-align: center;
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            margin: 0 auto;
        }

        .signature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: 'Calibri', sans-serif;
            font-size: 18px;
            color: #333;
            font-weight: 300;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .press-message {
            position: fixed;
            bottom: 15%;        /* 75% от верха */
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Calibri', sans-serif;
            font-size: 108px;
            color: #333333bd;
            font-weight: 300;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 100;
            pointer-events: none;
        }

        .press-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="image-wrapper">
        <img src="IMG_7835.png" alt="Центрированная картинка">
    </div>

    <div class="signature">Портфолио. Гаркуша Михаил.</div>
    <div class="press-message" id="pressMessage">Press</div>

    <script>
        // Переход на CV при клике
        document.addEventListener('click', function() {
            window.location.href = 'CV.html';
        });

        // Показать надпись через 3 секунды
        setTimeout(function() {
            document.getElementById('pressMessage').classList.add('show');
        }, 3000);
    </script>
</body>
</html>
